# =============================================================================
# my-blog 技术文档 - MkDocs 配置文件
# =============================================================================
# 文档：https://www.mkdocs.org/user-guide/configuration/
# 主题：https://squidfunk.github.io/mkdocs-material/
# =============================================================================

# -----------------------------------------------------------------------------
# 站点信息
# -----------------------------------------------------------------------------
site_name: my-blog 技术文档
site_description: Zig 静态博客生成器的完整技术剖析
site_url: https://linychuo.github.io/my-blog-analysis
site_author: linyichuo

# -----------------------------------------------------------------------------
# 仓库配置
# -----------------------------------------------------------------------------
repo_url: https://github.com/linychuo/my-blog-analysis
repo_name: linyichuo/my-blog-analysis
edit_uri: edit/main/docs/

# -----------------------------------------------------------------------------
# 主题配置 (mkdocs-material)
# -----------------------------------------------------------------------------
theme:
  name: material
  language: zh
  icon:
    logo: material/library
    repo: fontawesome/brands/github
  favicon: img/favicon.ico

  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: 跟随系统
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.path
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
    - toc.follow

# -----------------------------------------------------------------------------
# 插件配置
# -----------------------------------------------------------------------------
plugins:
  - search:
      lang:
        - zh
        - en
  - minify:
      minify_html: true

# -----------------------------------------------------------------------------
# Markdown 扩展
# -----------------------------------------------------------------------------
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:pymdownx.emoji.twemoji
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - admonition
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      permalink_title: 永久链接
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.keys
  - pymdownx.magiclink

