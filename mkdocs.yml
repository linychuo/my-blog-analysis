site_name: My Blog Analysis - Zig 技术文档
site_description: Zig 博客分析系统的完整技术文档，包含项目概览、快速开始、语言基础等 14 个部分
site_url: https://linychuo.github.io/my-blog-analysis
repo_url: https://github.com/linychuo/my-blog-analysis
repo_name: my-blog-analysis
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  logo: img/logo.png
  favicon: img/favicon.ico
  
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - toc.sticky
    
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search:
      lang: 
        - zh
        - en
  - minify:
      minify_html: true
  - glightbox

markdown_extensions:
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:pymdownx.emoji.twemoji
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - admonition
  - pymdownx.details
  - pymdownx.tasklist
  - attr_list
  - md_in_html
  - toc:
      permalink: true

