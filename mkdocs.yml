# Project Information
site_name: my-blog 技术文档
site_description: Zig 静态博客生成器的完整技术剖析 - 53 篇文章全面覆盖项目架构、实现细节和扩展开发
site_url: https://linychuo.github.io/my-blog-analysis
site_author: linyichuo

# Repository
repo_url: https://github.com/linychuo/my-blog-analysis
repo_name: linyichuo/my-blog-analysis
edit_uri: edit/main/docs/

# Theme Configuration
theme:
  name: material
  language: zh
  icon:
    logo: material/library
    repo: fontawesome/brands/github
  favicon: img/favicon.ico
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式

  features:
    # Navigation
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.path
    
    # Search
    - search.suggest
    - search.highlight
    - search.share
    
    # Content
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tooltips
    
    # Table of Contents
    - toc.follow
    - toc.integrate

# Plugins
plugins:
  - search:
      lang:
        - zh
        - en
  - minify:
      minify_html: true

# Markdown Extensions
markdown_extensions:
  # Syntax Highlighting
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  
  # Tabs
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  
  # Emoji
  - pymdownx.emoji:
      emoji_index: !!python/name:pymdownx.emoji.twemoji
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
      options:
        custom_icons:
          - overrides/.icons
  
  # Admonitions
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  
  # Task Lists
  - pymdownx.tasklist:
      custom_checkbox: true
  
  # Attributes
  - attr_list
  - md_in_html
  
  # Table of Contents
  - toc:
      permalink: true
      permalink_title: 永久链接
      separator: "-"
  
  # Other
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.keys

# Navigation Structure
