# =============================================================================
# my-blog 技术文档 - MkDocs 配置文件
# =============================================================================
# 文档：https://www.mkdocs.org/user-guide/configuration/
# 主题：https://squidfunk.github.io/mkdocs-material/
# =============================================================================

# -----------------------------------------------------------------------------
# 站点信息
# -----------------------------------------------------------------------------
site_name: my-blog 技术文档
site_description: Zig 静态博客生成器的完整技术剖析
site_url: https://linychuo.github.io/my-blog-analysis
site_author: linyichuo

# -----------------------------------------------------------------------------
# 仓库配置
# -----------------------------------------------------------------------------
repo_url: https://github.com/linychuo/my-blog-analysis
repo_name: linyichuo/my-blog-analysis
edit_uri: edit/main/docs/

# -----------------------------------------------------------------------------
# 主题配置 (mkdocs-material)
# -----------------------------------------------------------------------------
theme:
  name: material
  language: zh
  icon:
    logo: material/library
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  favicon: img/favicon.ico
  
  # 颜色模式 - 支持自动切换和用户手动切换
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: 跟随系统
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式

  # 功能特性
  features:
    # 导航
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.path
    - navigation.top
    - navigation.tracking
    - navigation.footer
    
    # 搜索
    - search.suggest
    - search.highlight
    - search.share
    
    # 内容
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
    - content.code.select
    - content.action.edit
    - content.action.view
    - content.tooltips
    
    # 目录
    - toc.follow
    - toc.integrate

# -----------------------------------------------------------------------------
# 插件配置
# -----------------------------------------------------------------------------
plugins:
  # 搜索插件
  - search:
      lang:
        - zh
        - en
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  
  # HTML 压缩
  - minify:
      minify_html: true

# -----------------------------------------------------------------------------
# Markdown 扩展
# -----------------------------------------------------------------------------
markdown_extensions:
  # 代码高亮
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  
  # 代码块
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  
  # 标签页
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  
  # Emoji 表情
  - pymdownx.emoji:
      emoji_index: !!python/name:pymdownx.emoji.twemoji
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  
  # 提示框
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  
  # 任务列表
  - pymdownx.tasklist:
      custom_checkbox: true
  
  # 属性支持
  - attr_list
  - md_in_html
  
  # 目录
  - toc:
      permalink: true
      permalink_title: 永久链接
      separator: "-"
  
  # 数学公式
  - pymdownx.arithmatex:
      generic: true
  
  # 其他增强
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.keys
  - pymdownx.critic
  - pymdownx.magiclink

